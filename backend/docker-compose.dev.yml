version: '3.8'
name: drive-storage-backend-dev

path:
  - path: ./nginx/docker-compose.dev.yml

services:
  rabbitmq:
    container_name: rabbitmq-drive-storage-dev
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_PORT}:${RABBITMQ_PORT}" # AMQP port
      - "${RABITTMQ_MANAGEMENT_PORT}:${RABITTMQ_MANAGEMENT_PORT}" # Management UI

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

    networks:
      - drive-storage-network
    
    volumes:
      - rabbitmq-drive-storage-data:/var/lib/rabbitmq

  postgres:
    container_name: postgres-drive-storage-dev
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}

    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    
    networks:
      - drive-storage-network

    volumes:
      - postgres-drive-storage-data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh


networks:
  drive-storage-network:
    name: drive-storage-network

volumes:
  pnpm-store:
    name: pnpm-store
  postgres-drive-storage-data:
    name: postgres-drive-storage-data
  rabbitmq-drive-storage-data:
    name: rabbitmq-drive-storage-data
