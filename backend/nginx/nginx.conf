events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    log_format  main    '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/public_access.log  main;
    error_log   /var/log/nginx/public_error.log warn;

    # Cấu hình tối ưu hóa truyền tải dữ liệu
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Bật nén Gzip để tiết kiệm băng thông cho Client
    gzip on;
    gzip_disable "msie6";
    gzip_types application/json text/plain application/javascript text/css;

    # 1. Định nghĩa vị trí của NestJS API Gateway Service (NodeJS chạy HTTP)
    upstream api_gateway_service {
        server api-gateway-service:3000; # Thay bằng IP:Port thực tế nơi NestJS API Gateway đang chạy
        keepalive 32;          # Giữ kết nối mở để tăng tốc độ forward
    }

    # 2. Cấu hình Rate Limiting (Chống DDOS cơ bản cho API)
    # Giới hạn mỗi IP chỉ được gọi tối đa 10 request / 1 giây
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 3. Server Block chính (Lắng nghe cổng HTTP công cộng)
    server {
        listen 80;
        server_name localhost; # Thay bằng domain hoặc IP công cộng của bạn

        # Áp dụng giới hạn request cho toàn bộ các route /api
        limit_req zone=api_limit burst=20 nodelay;

        # Cấu hình bảo mật Header cơ bản
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Tuyến đường xử lý API chính
        # Client gọi: http://api.yourdomain.com/hero/HeroService/FindOne/

        location /users/ {
            # --- CẤU HÌNH CORS CHUẨN CHO FRONTEND ---
            add_header 'Access-Control-Allow-Origin' '*' always; # Thay '*' thành domain frontend nếu cần bảo mật hơn
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            # Xử lý request OPTIONS (Preflight request từ Browser)
            # if ($request_method = 'OPTIONS') {
            #     add_header 'Access-Control-Allow-Origin' '*';
            #     add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            #     add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            #     add_header 'Access-Control-Max-Age' 1728000;
            #     content_type 'text/plain; charset=utf-8';
            #     content_length 0;
            #     return 204;
            # }

            # --- CẤU HÌNH REVERSE PROXY SANG NESTJS API GATEWAY ---
            rewrite ^/users/([^/]+)/?$ /api-gateway/users/$1 break;
            proxy_pass http://api_gateway_service;

            # Giữ nguyên các Header quan trọng của Client gốc truyền vào để NestJS có thể đọc được (như IP thật, Token...)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cấu hình Timeouts tránh việc treo request quá lâu
            proxy_connect_timeout       60s;
            proxy_send_timeout          60s;
            proxy_read_timeout          60s;
            proxy_buffer_size           128k;
            proxy_buffers               4 256k;
            proxy_busy_buffers_size     256k;
        }

        

        # Trang báo lỗi custom nếu NestJS API Gateway bị sập (502)
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
